<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lolo Dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --accent: #f0c040;
    --accent2: #ff6b35;
    --text: #f0ede8;
    --muted: #888;
    --border: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--accent); letter-spacing: -1px; }
  .logo span { color: var(--text); }
  header p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .search-wrap { padding: 24px 16px 12px; max-width: 700px; margin: 0 auto; }
  .search-box {
    display: flex; align-items: center;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 12px 16px; gap: 10px;
    transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }

  .tabs { display: flex; gap: 8px; padding: 0 16px 16px; max-width: 700px; margin: 0 auto; flex-wrap: wrap; }
  .tab {
    padding: 8px 18px; border-radius: 100px; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: none; color: var(--muted);
    transition: all .2s; font-family: 'DM Sans', sans-serif;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  .stats { display: flex; gap: 10px; padding: 0 16px 16px; max-width: 700px; margin: 0 auto; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 0.72rem; color: var(--muted); }
  .stat strong { color: var(--accent); font-size: 1.05rem; display: block; }

  .results-count { padding: 0 16px 10px; max-width: 700px; margin: 0 auto; font-size: 0.75rem; color: var(--muted); }

  .grid { padding: 0 16px 60px; max-width: 700px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width: 480px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; cursor: pointer;
    transition: border-color .2s, transform .15s; position: relative; overflow: hidden;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card.phrasal { border-left: 3px solid var(--accent2); }
  .card-tag { font-size: 0.62rem; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px; }
  .card-tag.v { color: var(--accent); }
  .card-tag.p { color: var(--accent2); }
  .card-en { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); margin-bottom: 4px; padding-right: 24px; }
  .card-es { font-size: 0.82rem; color: var(--muted); }
  .card-ex { font-size: 0.73rem; color: #666; font-style: italic; line-height: 1.4; display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .card.open .card-ex { display: block; }
  .speak-btn { position: absolute; top: 12px; right: 10px; background: none; border: none; cursor: pointer; font-size: 0.85rem; color: var(--muted); transition: color .2s; }
  .speak-btn:hover { color: var(--accent); }

  .letter-div { grid-column: 1/-1; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; color: #333; padding: 8px 0 4px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.72rem; border-top: 1px solid var(--border); }
  footer span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">LOLO <span>Dictionary</span></div>
    <p>Inglés para latinos 🇲🇽🇨🇦</p>
  </div>

<div class="search-wrap">

    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Busca en español o inglés... ej: house, give up, trabajo" autocomplete="off">
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="all" onclick="setTab(this,'all')">Todo</button>
  <button class="tab" data-tab="vocab" onclick="setTab(this,'vocab')">📚 Vocabulario</button>
  <button class="tab" data-tab="phrasal" onclick="setTab(this,'phrasal')">🔗 Phrasal Verbs</button>
</div>

<div class="stats">

  <div class="stat"><strong>A1–A2</strong>Nivel</div>
  <div class="stat"><strong>🔊</strong>Audio incluido</div>
</div>

<div class="results-count" id="resultsCount"></div>
<div class="grid" id="grid"></div>

<footer>Hecho con ❤️ por <span>Lolo Basic English</span> · Para latinos en Canadá y México</footer>

let tab = 'all';

function setTab(el, val) {
  tab = val;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function speak(txt, e) {
  e.stopPropagation();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function toggle(el) { el.classList.toggle('open'); }

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = D.filter(item => {
    const matchTab = tab === 'all' || item.t === tab;
    const matchQ = !q || item.en.toLowerCase().includes(q) || item.es.toLowerCase().includes(q);
    return matchTab && matchQ;
  });

  document.getElementById('resultsCount').textContent =
    filtered.length > 0 ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}` : '';

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>No encontramos "${q}"</p><p style="margin-top:8px;font-size:.75rem">Intenta en español o en inglés</p></div>`;
    return;
  }

  const sorted = [...filtered].sort((a,b) => a.en.localeCompare(b.en));
  let html = '', lastLetter = '';

  sorted.forEach(item => {
    const letter = item.en[0].toUpperCase();
    if (!q && letter !== lastLetter) {
      lastLetter = letter;
      html += `<div class="letter-div">${letter}</div>`;
    }
    const safe = item.en.replace(/'/g,"\\'");
    html += `
      <div class="card ${item.t==='phrasal'?'phrasal':''}" onclick="toggle(this)">
        <div class="card-tag ${item.t==='vocab'?'v':'p'}">${item.t==='phrasal'?'🔗 Phrasal Verb':'📚 Vocabulario'}</div>
        <div class="card-en">${item.en}</div>
        <div class="card-es">${item.es}</div>
        <button class="speak-btn" onclick="speak('${safe}',event)" title="Escuchar">🔊</button>
        <div class="card-ex">${item.ex}</div>
      </div>`;
  });

  grid.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', render);
render();
</script>
